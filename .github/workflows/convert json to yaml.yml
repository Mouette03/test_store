name: Runtipi Native Docker Migration 3
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  codemod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Pre-cache le codemod (sans erreur)
        run: npx codemod@latest @runtipi/native-docker --help 2>&1 || true

      - name: Installer @runtipi/common dans le cache du codemod
        run: |
          CACHE_DIR="$HOME/.local/share/codemod/cache/packages/@runtipi/native-docker/0.1.3"
          echo "Cache dir: $CACHE_DIR"
          mkdir -p "$CACHE_DIR"
          cd "$CACHE_DIR"
          npm init -y
          npm install @runtipi/common
          ls node_modules/

      - name: Run codemod (dry-run)
        run: npx codemod@latest @runtipi/native-docker

      - name: Run codemod (write)
        run: npx codemod@latest @runtipi/native-docker --param write=true --param force=true

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: migrate to native docker-compose.yml" || echo "Rien à commiter"
          git pull --rebase origin main
          git push
