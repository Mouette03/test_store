name: Runtipi Native Docker Migration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  codemod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      # 1) Télécharger le package du codemod DANS UN DOSSIER TEMP
      - name: Télécharger le codemod dans un dossier temp
        run: |
          TMP_DIR="$HOME/runtipi_native_docker"
          mkdir -p "$TMP_DIR"
          cd "$TMP_DIR"
          npm init -y
          npm install @runtipi/native-docker
          ls node_modules/@runtipi/native-docker

      # 2) Installer @runtipi/common dans ce même dossier
      - name: Installer @runtipi/common pour le codemod
        run: |
          TMP_DIR="$HOME/runtipi_native_docker"
          cd "$TMP_DIR"
          npm install @runtipi/common

      # 3) Exécuter le codemod en pointant NODE_PATH sur ce dossier
      - name: Run codemod (dry-run)
        run: |
          TMP_DIR="$HOME/runtipi_native_docker"
          export NODE_PATH="$TMP_DIR/node_modules"
          npx codemod@latest @runtipi/native-docker

      - name: Run codemod (write)
        run: |
          TMP_DIR="$HOME/runtipi_native_docker"
          export NODE_PATH="$TMP_DIR/node_modules"
          npx codemod@latest @runtipi/native-docker --param write=true --param force=true
        # --param delete_json=true

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: migrate to native docker-compose.yml" || echo "Rien à commiter"
          git pull --rebase origin main
          git push
