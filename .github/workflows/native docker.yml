name: Runtipi Native Docker Migration

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode d\'exécution'
        required: true
        default: 'dry-run'
        type: choice
        options:
        - dry-run
        - write

permissions:
  contents: write

jobs:
  codemod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Run codemod
        run: |
          echo "Mode: ${{ github.event.inputs.mode }}"
          if [ "${{ github.event.inputs.mode }}" = "write" ]; then
            echo "🚀 Lancement en mode WRITE (fichiers modifiés)"
            npx codemod@latest @runtipi/native-docker --param write=true --param force=true
            # --param delete_json=true   ← ICI : COMMENTÉ (ne supprime PAS les JSON)
          else
            echo "🔍 Lancement en mode DRY-RUN (simulation)"
            npx codemod@latest @runtipi/native-docker
          fi

      - name: Commit changes (seulement si write)
        if: github.event.inputs.mode == 'write'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: migrate to native docker-compose.yml" || echo "Rien à commiter"
          git pull --rebase origin main
          git push
