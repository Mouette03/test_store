# Workflow: Auto-update Docker images for all Runtipi apps
#
# Triggered daily at 03:00 UTC and manually via workflow_dispatch.
# Reads apps-policy.json for per-app lock policies, queries Docker Hub and
# GHCR for newer tags, updates docker-compose.json and config.json, then
# opens (or updates) a pull request with the summary of changes.

name: Auto-update Docker images

on:
  # Run every day at 03:00 UTC
  schedule:
    - cron: '0 3 * * *'
  # Allow manual triggering
  workflow_dispatch:

# Grant write access to push changes, open/update PRs, and read package metadata
permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  update-apps:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repository ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Run the Python update script ────────────────────────────────
      # The script:
      #   • Reads apps-policy.json for per-app lock policies
      #   • For every app, parses the compose file to find service images
      #   • Detects the main service via isMain (JSON) or x-runtipi.is_main (YAML)
      #   • Queries Docker Hub / GHCR for newer tags matching the lock policy
      #   • Preserves tag prefix (e.g. "v") and suffix (e.g. "-alpine")
      #   • Updates the compose file with new image tags
      #   • Updates config.json: tipi_version +1, updated_at (ms timestamp),
      #     and version (only if the main service image changed)
      #   • Writes a Markdown summary to /tmp/pr_body.md
      #   • Sets HAS_CHANGES and UPDATE_DATE in GITHUB_ENV
      - name: Update Docker image tags
        shell: python3 {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import json
          import os
          import re
          import sys
          import time
          import urllib.parse
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone

          # ── Helpers ──────────────────────────────────────────────────────

          def fetch_json(url, headers=None, retries=3, timeout=15):
              """GET url and return parsed JSON, with retry on transient errors."""
              req = urllib.request.Request(url)
              if headers:
                  for k, v in headers.items():
                      req.add_header(k, v)
              for attempt in range(retries):
                  try:
                      with urllib.request.urlopen(req, timeout=timeout) as resp:
                          return json.loads(resp.read().decode())
                  except urllib.error.HTTPError as exc:
                      # 401/403 → no point retrying
                      if exc.code in (401, 403, 404):
                          print(f"    HTTP {exc.code} for {url}", file=sys.stderr)
                          return None
                      if attempt < retries - 1:
                          time.sleep(2 ** attempt)
                  except Exception as exc:
                      if attempt < retries - 1:
                          time.sleep(2 ** attempt)
                      else:
                          print(f"    Request failed ({url}): {exc}", file=sys.stderr)
              return None

          def parse_image(image_str):
              """
              Split an image reference into (registry, image_name, tag, base).
              • base  = image_str without the tag portion
              • For official Docker Hub images (no slash), prepends 'library/'.
              """
              parts = image_str.split('/')
              last = parts[-1]
              if ':' in last:
                  tag = last.split(':', 1)[1]
                  parts[-1] = last.split(':', 1)[0]
              else:
                  tag = None
              base = '/'.join(parts)   # image_str without tag

              # Detect non-Docker-Hub registries (contain a dot or colon in the host)
              if len(parts) >= 2 and ('.' in parts[0] or ':' in parts[0]):
                  registry = parts[0]
                  image_name = '/'.join(parts[1:])
              else:
                  registry = 'docker.io'
                  if len(parts) == 1:
                      # Official library image (e.g. "ghost", "redis")
                      image_name = 'library/' + parts[0]
                  else:
                      # User/org image (e.g. "portainer/portainer-ce")
                      image_name = '/'.join(parts)

              return registry, image_name, tag, base

          def parse_tag_version(tag):
              """
              Decompose a tag into (prefix, version_parts, suffix).
              • prefix  : optional leading 'v'
              • version_parts : list of ints, e.g. [34, 0, 1]
              • suffix  : trailing string, e.g. '-apache'

              Returns (None, None, tag) when the tag cannot be parsed as semver
              (e.g. 'latest', 'stable', 'sha-abc', 'version-hash', or a bare
              major-only number like '17' or '11').
              """
              m = re.match(
                  r'^(v?)(\d+)(?:\.(\d+)(?:\.(\d+))?)?(.*)$',
                  tag
              )
              if not m:
                  return None, None, tag

              prefix  = m.group(1)
              major   = int(m.group(2))
              minor   = m.group(3)
              patch   = m.group(4)
              suffix  = m.group(5) or ''

              # Bare major version (e.g. "17", "11") → floating tag, skip
              if minor is None:
                  return None, None, tag

              version_parts = [major, int(minor)]
              if patch is not None:
                  version_parts.append(int(patch))

              return prefix, version_parts, suffix

          def parse_ls_build_tag(tag):
              """
              Parse tags like '<anything>-ls82' used by some LinuxServer images.
              Returns (prefix, build_number) or (None, None) when not matched.
              """
              m = re.match(r'^(.*)-ls(\d+)$', tag)
              if not m:
                  return None, None
              return m.group(1), int(m.group(2))

          def version_to_str(parts):
              return '.'.join(str(v) for v in parts)

          def config_version_from_tag(tag):
              """
              Derive config.json "version" from an image tag.
              - semver tags keep optional leading 'v' (e.g. v1.2.3)
              - hash-ls tags keep full tag (e.g. d67e71cc-ls82)
              - sha-hash tags strip 'sha-' prefix (e.g. sha-e1c83ba → e1c83ba)
              """
              if tag.startswith('sha-'):
                  return tag[4:]
              v_prefix, v_parts, _ = parse_tag_version(tag)
              if v_parts:
                  return f'{v_prefix}{version_to_str(v_parts)}'
              _, ls_build = parse_ls_build_tag(tag)
              if ls_build is not None:
                  return tag
              return None

          def get_newest_sha_tag_github(owner, package_name):
              """
              Query the GitHub Packages API to find the most recently published
              container version that carries a 'sha-*' tag.
              Versions are returned newest-first by the API, so the first sha-tag
              found is the most recent one.
              Returns the tag string, or None on failure / no sha-tag found.
              """
              gh_token = os.environ.get('GH_TOKEN', '')
              headers = {
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              }
              if gh_token:
                  headers['Authorization'] = 'Bearer ' + gh_token
              encoded_pkg = urllib.parse.quote(package_name, safe='')
              url = (
                  f'https://api.github.com/users/{owner}/packages'
                  f'/container/{encoded_pkg}/versions?per_page=100'
              )
              data = fetch_json(url, headers=headers)
              if not data or not isinstance(data, list):
                  return None
              for version in data:
                  tags = version.get('metadata', {}).get('container', {}).get('tags', [])
                  for t in tags:
                      if t.startswith('sha-'):
                          return t
              return None

          def is_upgrade(candidate, current, lock):
              """
              Return True if candidate is a valid upgrade of current under lock.
              lock='minor'  → same major, any higher minor or patch
              lock='patch'  → same major AND minor, only higher patch
              """
              if lock == 'minor':
                  if candidate[0] != current[0]:
                      return False
              elif lock == 'patch':
                  if len(candidate) < 3 or len(current) < 3:
                      return False
                  if candidate[0] != current[0] or candidate[1] != current[1]:
                      return False
              return candidate > current

          # ── Registry helpers ─────────────────────────────────────────────

          def get_dockerhub_tags(image_name, prefix, major):
              """
              Fetch tags from Docker Hub that start with '{prefix}{major}.'.
              Returns a flat list of tag strings.
              """
              tag_prefix = f'{prefix}{major}.'
              url = (
                  f'https://hub.docker.com/v2/repositories/{image_name}/tags'
                  f'?name={tag_prefix}&ordering=last_updated&page_size=100'
              )
              data = fetch_json(url)
              if data is None:
                  return []
              return [r['name'] for r in data.get('results', [])]

          def get_ghcr_token(image_name):
              """
              Obtain an anonymous pull token from ghcr.io.
              Works for both GHCR images and lscr.io (LinuxServer.io) images,
              since lscr.io shares the same auth infrastructure as GHCR.
              image_name must be in the form '<org>/<repo>' (without registry prefix).
              """
              url = (
                  f'https://ghcr.io/token'
                  f'?scope=repository:{image_name}:pull&service=ghcr.io'
              )
              data = fetch_json(url)
              return data.get('token') if data else None

          def get_ghcr_tags(image_name):
              """
              Fetch tags from GHCR using anonymous bearer authentication.
              Returns a flat list of tag strings.
              """
              token = get_ghcr_token(image_name)
              if not token:
                  return []
              headers = {'Authorization': 'Bearer ' + token}
              url = f'https://ghcr.io/v2/{image_name}/tags/list?n=500'
              data = fetch_json(url, headers=headers)
              if data is None:
                  return []
              return data.get('tags', [])

          def get_lscr_tags(image_name):
              """
              Fetch tags from lscr.io (LinuxServer.io) using anonymous bearer
              authentication.  The token is obtained from ghcr.io (shared
              infrastructure), then used against the lscr.io v2 API.
              image_name must be in the form 'linuxserver/<repo>'.
              Tags of the form '1.2.3-ls45' are returned as-is; the '-ls<n>'
              suffix is treated like any other tag suffix and preserved on update.
              Returns a flat list of tag strings.
              """
              token = get_ghcr_token(image_name)
              if not token:
                  return []
              headers = {'Authorization': 'Bearer ' + token}
              url = f'https://lscr.io/v2/{image_name}/tags/list?n=500'
              data = fetch_json(url, headers=headers)
              if data is None:
                  return []
              return data.get('tags', [])

          def get_codeberg_token(image_name):
              """
              Obtain an anonymous pull token from Codeberg's OCI registry.
              image_name must be in the form '<owner>/<repo>' (without 'codeberg.org/').
              """
              url = (
                  f'https://codeberg.org/v2/token'
                  f'?scope=repository:{image_name}:pull&service=codeberg.org'
              )
              data = fetch_json(url)
              return data.get('token') if data else None

          def get_codeberg_tags(image_name):
              """
              Fetch tags from codeberg.org using anonymous OCI bearer authentication.
              image_name must be in the form '<owner>/<repo>' (e.g. 'forgejo/forgejo').
              Returns a flat list of tag strings.
              """
              token = get_codeberg_token(image_name)
              if not token:
                  return []
              headers = {'Authorization': 'Bearer ' + token}
              url = f'https://codeberg.org/v2/{image_name}/tags/list?n=500'
              data = fetch_json(url, headers=headers)
              if data is None:
                  return []
              return data.get('tags', [])

          def find_best_tag(current_tag, registry, image_name, lock):
              """
              Find the highest available tag that is a valid upgrade of
              current_tag under the given lock policy.
              Returns the new tag string, or None if no upgrade is available.
              Supported registries: docker.io, ghcr.io, lscr.io, codeberg.org
              """
              prefix, cur_parts, suffix = parse_tag_version(current_tag)
              _, cur_ls_build = parse_ls_build_tag(current_tag)
              if cur_parts is None and cur_ls_build is None:
                  # Handle sha-prefixed commit-hash tags (e.g. sha-e1c83ba)
                  if re.match(r'^sha-[0-9a-f]+$', current_tag):
                      if registry != 'ghcr.io':
                          print(f'    Skipping sha-tag for non-GHCR registry: {current_tag}')
                          return None
                      img_parts = image_name.split('/', 1)
                      if len(img_parts) < 2:
                          print(f'    Cannot parse owner/package from: {image_name}')
                          return None
                      owner, package = img_parts[0], '/'.join(img_parts[1:])
                      newest = get_newest_sha_tag_github(owner, package)
                      if newest and newest != current_tag:
                          return newest
                      return None
                  print(f'    Skipping unsupported tag format: {current_tag}')
                  return None

              # Fetch candidate tags from the appropriate registry
              if registry == 'ghcr.io':
                  all_tags = get_ghcr_tags(image_name)
              elif registry == 'lscr.io':
                  # LinuxServer.io — same bearer-token auth as GHCR
                  all_tags = get_lscr_tags(image_name)
              elif registry == 'codeberg.org':
                  # Codeberg OCI registry (e.g. Forgejo)
                  all_tags = get_codeberg_tags(image_name)
              elif registry == 'docker.io':
                  if cur_parts is None:
                      print(f'    Skipping non-semver Docker Hub tag: {current_tag}')
                      return None
                  major = cur_parts[0]
                  all_tags = get_dockerhub_tags(image_name, prefix, major)
              else:
                  print(f'    Unsupported registry: {registry} — skipping')
                  return None

              if not all_tags:
                  return None

              # Fallback for hash-like tags ending with '-lsNN' (e.g. d67e71cc-ls82)
              if cur_parts is None and cur_ls_build is not None:
                  best_tag      = None
                  best_ls_build = cur_ls_build
                  for tag in all_tags:
                      _, t_ls_build = parse_ls_build_tag(tag)
                      if t_ls_build is None:
                          continue
                      if t_ls_build > best_ls_build:
                          best_ls_build = t_ls_build
                          best_tag = tag
                  return best_tag

              best_parts = cur_parts[:]
              best_tag   = None

              for tag in all_tags:
                  t_prefix, t_parts, t_suffix = parse_tag_version(tag)
                  # Must share the same prefix and suffix
                  if t_prefix != prefix or t_suffix != suffix:
                      continue
                  # Skip un-parseable or differently-shaped tags
                  if t_parts is None or len(t_parts) != len(cur_parts):
                      continue
                  if is_upgrade(t_parts, best_parts, lock):
                      best_parts = t_parts
                      best_tag   = tag

              return best_tag  # None → already up-to-date

          def find_update_for_svc(svc, images_policy, default_lock):
              """
              Check whether a service image can be upgraded.
              Returns (old_image_str, new_image_str) when an upgrade exists,
              or (None, None) when the service is already up-to-date.
              Does NOT mutate the svc dict.
              """
              svc_name  = svc.get('name', '')
              image_str = svc.get('image', '')
              if not image_str:
                  return None, None
              svc_policy = images_policy.get(svc_name, {})
              lock       = svc_policy.get('lock', default_lock)
              print(f'  [{svc_name}] {image_str}  (lock={lock})')
              registry, img_name, current_tag, base = parse_image(image_str)
              if not current_tag:
                  print('    No tag — skipping')
                  return None, None
              new_tag = find_best_tag(current_tag, registry, img_name, lock)
              if new_tag and new_tag != current_tag:
                  new_image = f'{base}:{new_tag}'
                  print(f'    ✓ {image_str}  →  {new_image}')
                  return image_str, new_image
              print('    Already up-to-date')
              return None, None

          # ── Main loop ────────────────────────────────────────────────────

          with open('apps-policy.json') as fh:
              policy = json.load(fh)

          default_lock = policy.get('_default', {}).get('lock', 'minor')

          changes_summary = []  # [(app, svc_name, old_image, new_image)]
          apps_dir = 'apps'

          for app_name in sorted(os.listdir(apps_dir)):
              app_dir = os.path.join(apps_dir, app_name)
              if not os.path.isdir(app_dir):
                  continue

              # Locate docker-compose file (prefer YAML, fall back to JSON)
              compose_path = None
              for fname in ('docker-compose.yml', 'docker-compose.yaml', 'docker-compose.json'):
                  candidate = os.path.join(app_dir, fname)
                  if os.path.exists(candidate):
                      compose_path = candidate
                      break

              config_path = os.path.join(app_dir, 'config.json')
              if compose_path is None or not os.path.exists(config_path):
                  continue

              print(f'\n=== {app_name} ===')

              # Load compose (JSON or YAML)
              with open(compose_path) as fh:
                  if compose_path.endswith('.json'):
                      compose = json.load(fh)
                  else:
                      try:
                          import yaml
                          compose = yaml.safe_load(fh)
                      except ImportError:
                          print('  PyYAML not available — skipping YAML compose')
                          continue

              with open(config_path) as fh:
                  config = json.load(fh)

              # Per-app policy
              app_policy    = policy.get(app_name, {})
              images_policy = app_policy.get('images', {})

              compose_changed     = False
              primary_new_version = None   # set only if the primary service changes
              app_changes         = []

              # Normalise services to a list with a 'name' field, supporting
              # both Runtipi list format and standard docker-compose dict format.
              raw_services = compose.get('services', [])
              if isinstance(raw_services, dict):
                  services = [{'name': k, **v} for k, v in raw_services.items()
                              if isinstance(v, dict)]
              elif isinstance(raw_services, list):
                  services = raw_services
              else:
                  print('  Unsupported compose format')
                  continue

              # Detect main service from compose file:
              #   • docker-compose.json  → isMain: true on the service object
              #   • docker-compose.yml   → x-runtipi.is_main: true on the service
              if compose_path.endswith('.json'):
                  primary_service = next(
                      (s.get('name') for s in services if s.get('isMain')), None
                  )
              else:
                  primary_service = next(
                      (s.get('name') for s in services
                       if isinstance(s.get('x-runtipi'), dict)
                       and s['x-runtipi'].get('is_main')),
                      None
                  )

              if not primary_service:
                  print('  No main service defined in compose — version will not be updated')

              # Pass 1 — check primary service first
              primary_svc = next(
                  (s for s in services if s.get('name') == primary_service), None
              )
              primary_updated = False
              if primary_svc:
                  old_img, new_img = find_update_for_svc(
                      primary_svc, images_policy, default_lock
                  )
                  if old_img:
                      primary_updated = True
                      compose_changed = True
                      app_changes.append((primary_service, old_img, new_img))
                      new_tag_str = new_img.rsplit(':', 1)[-1]
                      primary_new_version = config_version_from_tag(new_tag_str)

              # Pass 2 — update secondaries only when primary changed
              for svc in services:
                  if svc.get('name') == primary_service:
                      continue
                  svc_name = svc.get('name', '')
                  if not primary_updated:
                      print(f'  [{svc_name}] Skipped — primary service not updated')
                      continue
                  old_img, new_img = find_update_for_svc(
                      svc, images_policy, default_lock
                  )
                  if old_img:
                      compose_changed = True
                      app_changes.append((svc_name, old_img, new_img))

              if compose_changed:
                  new_tipi_version = config.get('tipi_version', 0) + 1
                  new_updated_at   = int(datetime.now(timezone.utc).timestamp() * 1000)

                  # ── Write compose file (in-place text replacement) ──────
                  # Avoids json.dump reformatting arrays onto multiple lines.
                  if compose_path.endswith('.json'):
                      with open(compose_path) as fh:
                          compose_text = fh.read()
                      for _, old_img, new_img in app_changes:
                          compose_text = compose_text.replace(
                              f'"image": "{old_img}"',
                              f'"image": "{new_img}"',
                          )
                      with open(compose_path, 'w') as fh:
                          fh.write(compose_text)
                  else:
                      import yaml
                      img_map = {old: new for _, old, new in app_changes}
                      raw_svcs = compose.get('services', [])
                      if isinstance(raw_svcs, dict):
                          for svc_data in raw_svcs.values():
                              if isinstance(svc_data, dict):
                                  old = svc_data.get('image', '')
                                  if old in img_map:
                                      svc_data['image'] = img_map[old]
                      else:
                          for svc in raw_svcs:
                              old = svc.get('image', '')
                              if old in img_map:
                                  svc['image'] = img_map[old]
                      with open(compose_path, 'w') as fh:
                          yaml.dump(compose, fh, default_flow_style=False, allow_unicode=True)

                  # ── Write config.json (in-place text replacement) ───────
                  # Avoids json.dump reformatting arrays (e.g. "categories")
                  # onto multiple lines.
                  with open(config_path) as fh:
                      config_text = fh.read()
                  config_text = re.sub(
                      r'("tipi_version"\s*:\s*)\d+',
                      rf'\g<1>{new_tipi_version}',
                      config_text,
                  )
                  config_text = re.sub(
                      r'("updated_at"\s*:\s*)\d+',
                      rf'\g<1>{new_updated_at}',
                      config_text,
                  )
                  if primary_new_version is not None:
                      config_text = re.sub(
                          r'("version"\s*:\s*)"[^"]*"',
                          rf'\g<1>"{primary_new_version}"',
                          config_text,
                      )
                  with open(config_path, 'w') as fh:
                      fh.write(config_text)

                  changes_summary.extend(
                      (app_name, svc, old, new) for svc, old, new in app_changes
                  )

          # ── Output ───────────────────────────────────────────────────────

          update_date = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          github_env  = os.environ.get('GITHUB_ENV', '/dev/null')

          if changes_summary:
              # Build PR body as a Markdown table
              lines = [
                  '## Docker image updates',
                  '',
                  '| App | Service | Old image | New image |',
                  '|-----|---------|-----------|-----------|',
              ]
              for app, svc, old, new in changes_summary:
                  lines.append(f'| `{app}` | `{svc}` | `{old}` | `{new}` |')

              pr_body = '\n'.join(lines) + '\n'
              with open('/tmp/pr_body.md', 'w') as fh:
                  fh.write(pr_body)

              n_images = len(changes_summary)
              n_apps   = len({c[0] for c in changes_summary})
              print(f'\nSummary: {n_images} image(s) updated in {n_apps} app(s).')

              with open(github_env, 'a') as fh:
                  fh.write(f'HAS_CHANGES=true\n')
                  fh.write(f'UPDATE_DATE={update_date}\n')
          else:
              print('\nNo updates found — everything is up-to-date.')
              # Write an empty body so the PR step has a valid file
              with open('/tmp/pr_body.md', 'w') as fh:
                  fh.write('No Docker image updates found.\n')
              with open(github_env, 'a') as fh:
                  fh.write(f'HAS_CHANGES=false\n')
                  fh.write(f'UPDATE_DATE={update_date}\n')

      # ── 3. Open / update a Pull Request with the changes ───────────────
      # peter-evans/create-pull-request will silently skip if there are no
      # staged changes, so the HAS_CHANGES guard is an extra safety net.
      - name: Create Pull Request
        if: env.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Commit message placed on the auto-update branch
          commit-message: 'chore(apps): auto-update Docker images ${{ env.UPDATE_DATE }}'
          # Branch that the PR targets
          base: main
          # Branch created/updated by this workflow
          branch: auto-update/docker-images
          # PR metadata
          title: 'chore(apps): auto-update ${{ env.UPDATE_DATE }}'
          body-path: /tmp/pr_body.md
          labels: auto-update
          # Delete the branch automatically after merge
          delete-branch: true