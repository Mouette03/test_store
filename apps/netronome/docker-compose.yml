services:
  netronome-init:
    image: 'privatebin/chown'
    restart: 'no'
    command:
      - '101:102'
      - '/data'
    volumes:
      - '${APP_DATA_DIR}/data:/data'
  netronome:
    image: 'ghcr.io/autobrr/netronome:v0.11.0'
    volumes:
      - '${APP_DATA_DIR}/data:/data'
    depends_on:
      netronome-init:
        condition: 'service_completed_successfully'
    x-runtipi:
      internal_port: 7575
      is_main: true
x-runtipi:
  schema_version: 2
