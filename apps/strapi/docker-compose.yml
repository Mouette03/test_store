services:
  strapi:
    image: 'vshadbolt/strapi:5.31.0-arm64'
    volumes:
      - '${APP_DATA_DIR}/config:/app/config'
      - '${APP_DATA_DIR}/public/uploads:/app/public/uploads'
    environment:
      - 'NODE_ENV=production'
      - 'DATABASE_CLIENT=mysql'
      - 'DATABASE_HOST=db-strapi'
      - 'DATABASE_PORT=3306'
      - 'DATABASE_NAME=strapi'
      - 'DATABASE_USERNAME=strapiuser'
      - 'DATABASE_PASSWORD=${MYSQL_PASSWORD}'
      - 'JWT_SECRET=${JWT_SECRET}'
      - 'ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}'
      - 'APP_KEYS=${APP_KEYS}'
    depends_on:
      db-strapi:
        condition: 'service_started'
    healthcheck:
      test: 'curl -f http://localhost:1337/admin || exit 1'
      interval: '30s'
      timeout: '10s'
      retries: 3
      start_period: '120s'
    x-runtipi:
      internal_port: 1337
      is_main: true
  db-strapi:
    image: 'mariadb:12'
    volumes:
      - '${APP_DATA_DIR}/data/db:/var/lib/mysql'
    environment:
      - 'MYSQL_USER=strapiuser'
      - 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}'
      - 'MYSQL_PASSWORD=${MYSQL_PASSWORD}'
      - 'MYSQL_DATABASE=strapi'
x-runtipi:
  schema_version: 2
