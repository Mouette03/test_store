services:
  opencloud:
    image: 'opencloudeu/opencloud-rolling:3.5.0'
    volumes:
      - '${APP_DATA_DIR}/data/config:/etc/opencloud'
      - '${APP_DATA_DIR}/data/data:/var/lib/opencloud'
    environment:
      - 'IDM_ADMIN_PASSWORD=${OPENCLOUD_ADMIN_PASSWORD}'
      - 'OC_INSECURE=true'
      - 'PROXY_HTTP_ADDR=0.0.0.0:9200'
      - 'OC_URL=https://${APP_DOMAIN}'
      - 'COLLABORATION_APP_NAME=CollaboraOnline'
      - 'COLLABORATION_APP_PRODUCT=Collabora'
      - 'COLLABORATION_APP_ADDR=http://opencloud-collabora:9980'
      - 'COLLABORATION_APP_INSECURE=true'
      - 'COLLABORATION_WOPI_SRC=http://opencloud-wopiserver:9300'
      - 'OC_JWT_SECRET=jde56fgszert4hd4drt899sfr4dsdkpqcbdz84564g'
      - 'OC_TRANSFER_SECRET=jde56fgszert4hd4drt899sfr4ddfgdpqcbdz84564g'
      - 'OC_MACHINEAUTH_API_KEY=c62e0c9d45c83a84c85e3f7c2b4d7a13fabc98b120d34567890abcdeffedcba09'
    depends_on:
      - 'opencloud-collabora'
      - 'opencloud-wopiserver'
    x-runtipi:
      internal_port: 9200
      is_main: true
  opencloud-collabora:
    image: 'collabora/code:latest'
    volumes:
      - '${APP_DATA_DIR}/data/collabora:/opt/collabora/share'
    environment:
      - 'aliasgroup1=http://opencloud-wopiserver:9300'
      - 'username=${COLLABORA_USERNAME}'
      - 'password=${COLLABORA_PASSWORD}'
      - 'extra_params=--o:ssl.enable=false --o:ssl.termination=true'
      - 'dictionaries=fr_FR en_US de_DE es_ES'
      - 'TZ=Europe/Paris'
    x-runtipi:
      internal_port: 9980
  opencloud-wopiserver:
    image: 'cs3org/wopiserver:latest'
    volumes:
      - '${APP_DATA_DIR}/data/wopi:/var/wopi_local_storage'
    environment:
      - 'WOPISERVER_INSECURE=true'
      - 'WOPISECRET=${WOPI_SECRET}'
      - 'WOPISERVER_DOMAIN=opencloud-wopiserver'
    x-runtipi:
      internal_port: 9300
x-runtipi:
  schema_version: 2
