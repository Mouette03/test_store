services:
  filyo:
    image: 'ghcr.io/mouette03/filyo:sha-b4502e6-mariadb'
    volumes:
      - '${APP_DATA_DIR}/data/filyo:/data'
    environment:
      - 'JWT_SECRET=${FILYO_JWT_SECRET}'
      - 'LOG_LEVEL=${FILYO_LOG_LEVEL}'
      - 'DB_HOST=filyo-db'
      - 'DB_USER=filyo'
      - 'DB_PASSWORD=test'
      - 'DB_NAME=filyo'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: '30s'
      timeout: '10s'
      retries: 3
      start_period: '20s'
    depends_on:
      filyo-db:
        condition: service_healthy
    x-runtipi:
      internal_port: 3001
      is_main: true

  filyo-db:
    image: 'mariadb:12.2'
    volumes:
      - '${APP_DATA_DIR}/data/mariadb:/var/lib/mysql'
    environment:
      - 'MYSQL_ROOT_PASSWORD=test'
      - 'MYSQL_DATABASE=filyo'
      - 'MYSQL_USER=filyo'
      - 'MYSQL_PASSWORD=test'
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -ufilyo -ptest --silent"]
      interval: '10s'
      timeout: '5s'
      retries: 10
      start_period: '60s'

x-runtipi:
  schema_version: 2
