services:
  forgejo:
    depends_on:
      forgejo-db:
        condition: service_healthy
    environment:
    - FORGEJO__database__DB_TYPE=mysql
    - FORGEJO__database__HOST=forgejo-db:3306
    - FORGEJO__database__NAME=forgejo
    - FORGEJO__database__USER=${FORGEJO_DB_USERNAME}
    - FORGEJO__database__PASSWD=${FORGEJO_DB_PASSWORD}
    - FORGEJO__server__ROOT_URL=${APP_PROTOCOL}://${APP_DOMAIN}/
    - FORGEJO__server__DOMAIN=${APP_HOST}
    - FORGEJO__server__PROTOCOL=http
    - FORGEJO__server__SSH_DOMAIN=${APP_HOST}
    - FORGEJO__server__SSH_PORT=222
    - FORGEJO__actions__ENABLED=false
    - FORGEJO__server__DISABLE_SSH=${APP_SSH_DISABLED}
    - FORGEJO__log.router__EXCLUSION=api/healthz
    healthcheck:
      interval: 1m
      retries: 3
      start_period: 1m
      test: curl -fsS http://127.0.0.1:3000/api/healthz | grep -Eq '"status"[[:space:]]*:[[:space:]]*"pass"'
        || (echo "Healthcheck failed" >&2; exit 1)
      timeout: 10s
    image: codeberg.org/forgejo/forgejo:14.0.5
    ports:
    - '222:22'
    volumes:
    - ${APP_DATA_DIR}/data/forgejo:/data
    x-runtipi:
      internal_port: 3000
      is_main: true
  forgejo-db:
    environment:
    - MYSQL_DATABASE=forgejo
    - MYSQL_USER=${FORGEJO_DB_USERNAME}
    - MYSQL_ROOT_PASSWORD=${FORGEJO_DB_ROOT_PASSWORD}
    - MYSQL_PASSWORD=${FORGEJO_DB_PASSWORD}
    healthcheck:
      interval: 5s
      retries: 20
      start_period: 30s
      test: mariadb-admin ping -h 127.0.0.1 -u root --password=${FORGEJO_DB_ROOT_PASSWORD}
        || exit 1
      timeout: 5s
    image: mariadb:11
    volumes:
    - ${APP_DATA_DIR}/data/mariadb:/var/lib/mysql
x-runtipi:
  schema_version: 2
