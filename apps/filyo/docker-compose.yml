services:
  filyo:
    image: 'ghcr.io/mouette03/filyo:oidc-2'
    volumes:
      - '${APP_DATA_DIR}/data:/data'
    environment:
      - 'NODE_ENV=production'
      - 'JWT_SECRET=${FILYO_JWT_SECRET}'
      - 'LOG_LEVEL=${FILYO_LOG_LEVEL}'
      - 'TRUST_PROXY=true'
      - 'OIDC_ISSUER_URL=https://accounts.google.com'
      - 'OIDC_CLIENT_ID=256183448981-h8calcp6khevipotri0k5miardgn1qer.apps.googleusercontent.com'
      - 'OIDC_CLIENT_SECRET=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'
      - 'OIDC_REDIRECT_URI=http://192.168.1.69:5858/api/auth/oidc/callback'
      - 'OIDC_PROVIDER_NAME=oidc'
      - 'OIDC_SCOPE=openid email profile'
      - 'OIDC_AUTO_REGISTER=auto_register'
      - 'OIDC_DEFAULT_ROLE=USER'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: '30s'
      timeout: '10s'
      retries: 3
      start_period: '20s'
    x-runtipi:
      internal_port: 3001
      is_main: true
x-runtipi:
  schema_version: 2