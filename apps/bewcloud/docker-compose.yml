services:
  website:
    image: 'ghcr.io/bewcloud/bewcloud:v2.3.0'
    volumes:
      - './data-files:/app/data-files'
      - './bewcloud.config.ts:/app/bewcloud.config.ts'
    x-runtipi:
      internal_port: 8000
      is_main: true
  postgresql:
    image: 'postgres:17'
    volumes:
      - 'bewcloud-db:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=fake'
      - 'POSTGRES_DB=bewcloud'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    x-runtipi:
      internal_port: 5432
x-runtipi:
  schema_version: 2
